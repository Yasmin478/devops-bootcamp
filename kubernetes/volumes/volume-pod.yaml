---
apiVersion: v1

kind: Pod

metadata:
  name: volume-demo

spec:
  containers:
    - name: app
      image: busybox
      command: ["sh", "-c", "sleep 3600"]

      volumeMounts:
        - name: data-volume
          mountPath: /data

      livenessProbe:
        exec:
          command:
            - cat
            - /tmp/healthy

        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 1
        failureThreshold: 3

  volumes:
    - name: data-volume
      emptyDir: {}
