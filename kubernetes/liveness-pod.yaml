---
apiVersion: v1
kind: Pod

metadata:
  name: liveness-demo
  namespace: dev

spec:
  containers:
    - name: app
      image: busybox:1.36

      command:
        - sh
        - -c
        - |
          touch /tmp/healthy
          echo "Container started"
          sleep 3600

      livenessProbe:
        exec:
          command:
            - cat
            - /tmp/healthy

        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
