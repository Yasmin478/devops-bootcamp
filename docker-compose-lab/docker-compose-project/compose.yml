services:
  app:
    build: .
    ports:
      - "${HOST_PORT}:5000"
    environment:
      APP_ENV: ${APP_ENV}
      APP_NAME: ${APP_NAME}
    depends_on:
      - redis
    networks:
      - backend

  redis:
    image: redis
    volumes:
      - redis-data:/data
    networks:
      - backend

volumes:
  redis-data:

networks:
  backend:
